name: Build & Release

on:
  push:
    tags:
      - 'v*'           # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build — ${{ matrix.os-label }}
    runs-on: ${{ matrix.runner }}
    outputs:
      app-version: ${{ steps.ver.outputs.app }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner:     windows-latest
            os-label:   Windows
            mvn-profile: windows
            pkg-type:   exe
            asset-name: 14bis-SSH-windows.exe

          - runner:     ubuntu-latest
            os-label:   Linux
            mvn-profile: linux
            pkg-type:   deb+rpm
            asset-name: 14bis-SSH-linux

          - runner:     macos-latest
            os-label:   macOS (Apple Silicon)
            mvn-profile: macos-arm
            pkg-type:   dmg
            asset-name: 14bis-SSH-macos.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build fat JAR
        run: mvn package -P ${{ matrix.mvn-profile }} -B -q

      - name: Get version info
        id: ver
        shell: bash
        run: |
          # GITHUB_REF_NAME is read as an env var (never inlined into the script), and
          # validated to a safe charset so the derived `app` output — which IS expanded
          # via ${{ }} into later run: blocks — can't carry shell metacharacters.
          TAG="${GITHUB_REF_NAME:-v0.0.0}"
          if [[ ! "$TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Refusing unsafe tag name: $TAG" >&2
            exit 1
          fi
          echo "app=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "jar=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -B)" >> "$GITHUB_OUTPUT"

      - name: Convert icon to ICO (Windows)
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $src = [System.Drawing.Image]::FromFile("$PWD\target\app-icon.png")
          $sizes = @(16,32,48,256)
          $ms = New-Object System.IO.MemoryStream
          $bw = New-Object System.IO.BinaryWriter($ms)
          $bw.Write([uint16]0)       # reserved
          $bw.Write([uint16]1)       # type = ICO
          $bw.Write([uint16]$sizes.Count)
          $images = @()
          foreach ($sz in $sizes) {
            $bmp = New-Object System.Drawing.Bitmap($sz, $sz)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
            $g.DrawImage($src, 0, 0, $sz, $sz)
            $g.Dispose()
            $tmp = New-Object System.IO.MemoryStream
            $bmp.Save($tmp, [System.Drawing.Imaging.ImageFormat]::Png)
            $images += $tmp.ToArray()
            $bmp.Dispose()
          }
          $offset = 6 + $sizes.Count * 16
          for ($i = 0; $i -lt $sizes.Count; $i++) {
            $sz = $sizes[$i]; $data = $images[$i]
            $bw.Write([byte]$(if ($sz -eq 256) { 0 } else { $sz }))
            $bw.Write([byte]$(if ($sz -eq 256) { 0 } else { $sz }))
            $bw.Write([byte]0); $bw.Write([byte]0)
            $bw.Write([uint16]1); $bw.Write([uint16]32)
            $bw.Write([uint32]$data.Length)
            $bw.Write([uint32]$offset)
            $offset += $data.Length
          }
          foreach ($data in $images) { $bw.Write($data) }
          $bw.Flush()
          [System.IO.File]::WriteAllBytes("$PWD\target\app-icon.ico", $ms.ToArray())
          $src.Dispose()

      - name: Package with jpackage (Windows)
        if: matrix.runner == 'windows-latest'
        shell: cmd
        run: |
          jpackage ^
            --input target ^
            --name "14bis SSH" ^
            --main-jar 14bis-ssh-${{ steps.ver.outputs.jar }}.jar ^
            --main-class br.com.quatorzebis.ssh.Main ^
            --type exe ^
            --app-version ${{ steps.ver.outputs.app }} ^
            --vendor "Molho Ltda." ^
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." ^
            --description "Lightweight SSH terminal client" ^
            --icon target\app-icon.ico ^
            --win-upgrade-uuid "C7A3F2E1-84BD-4D9A-B06E-2F1C3A5D8E90" ^
            --win-dir-chooser ^
            --win-menu ^
            --win-shortcut ^
            --dest installer
          for %%f in (installer\*.exe) do ren "%%f" "14bis-SSH-windows-${{ steps.ver.outputs.app }}.exe"

      - name: Sign Windows installer
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.CODE_SIGN_CERT_BASE64 }}
          CERT_PASS:   ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          if (-not $env:CERT_BASE64) {
            Write-Host "CODE_SIGN_CERT_BASE64 secret not set — skipping signing."
            exit 0
          }
          # Write PFX to a temp file
          $pfx = Join-Path $env:TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_BASE64))
          # Locate signtool from the Windows SDK
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like '*x64*' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }
          $installer = (Get-ChildItem installer\*.exe | Select-Object -First 1).FullName
          & $signtool sign `
            /fd  SHA256 `
            /td  SHA256 `
            /tr  http://timestamp.sectigo.com `
            /f   $pfx `
            /p   $env:CERT_PASS `
            $installer
          Remove-Item $pfx -Force
          Write-Host "Signed: $installer"

      - name: Package with jpackage (Windows portable)
        if: matrix.runner == 'windows-latest'
        shell: cmd
        run: |
          jpackage ^
            --input target ^
            --name "14bis SSH" ^
            --main-jar 14bis-ssh-${{ steps.ver.outputs.jar }}.jar ^
            --main-class br.com.quatorzebis.ssh.Main ^
            --type app-image ^
            --app-version ${{ steps.ver.outputs.app }} ^
            --vendor "Molho Ltda." ^
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." ^
            --description "Lightweight SSH terminal client" ^
            --icon target\app-icon.ico ^
            --dest installer-portable

      - name: Sign Windows portable exe
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.CODE_SIGN_CERT_BASE64 }}
          CERT_PASS:   ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          if (-not $env:CERT_BASE64) {
            Write-Host "CODE_SIGN_CERT_BASE64 secret not set — skipping signing."
            exit 0
          }
          $pfx = Join-Path $env:TEMP "codesign-portable.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like '*x64*' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }
          $exe = (Get-ChildItem "installer-portable\14bis SSH\14bis SSH.exe").FullName
          & $signtool sign `
            /fd  SHA256 `
            /td  SHA256 `
            /tr  http://timestamp.sectigo.com `
            /f   $pfx `
            /p   $env:CERT_PASS `
            $exe
          Remove-Item $pfx -Force
          Write-Host "Signed: $exe"

      - name: Zip Windows portable build
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "installer-portable\14bis SSH\*" `
            -DestinationPath "installer\14bis-SSH-windows-portable-${{ steps.ver.outputs.app }}.zip"

      - name: Install rpmbuild (Linux)
        if: matrix.runner == 'ubuntu-latest'
        run: sudo apt-get update -qq && sudo apt-get install -y rpm

      - name: Package with jpackage (Linux DEB)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          jpackage \
            --input target \
            --name "ssh-14bis" \
            --main-jar 14bis-ssh-${{ steps.ver.outputs.jar }}.jar \
            --main-class br.com.quatorzebis.ssh.Main \
            --type deb \
            --app-version ${{ steps.ver.outputs.app }} \
            --vendor "Molho Ltda." \
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." \
            --description "Lightweight SSH terminal client" \
            --icon target/app-icon.png \
            --linux-shortcut \
            --dest installer
          mv installer/*.deb installer/14bis-SSH-linux-${{ steps.ver.outputs.app }}.deb

      - name: Package with jpackage (Linux RPM)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          jpackage \
            --input target \
            --name "ssh-14bis" \
            --main-jar 14bis-ssh-${{ steps.ver.outputs.jar }}.jar \
            --main-class br.com.quatorzebis.ssh.Main \
            --type rpm \
            --app-version ${{ steps.ver.outputs.app }} \
            --vendor "Molho Ltda." \
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." \
            --description "Lightweight SSH terminal client" \
            --icon target/app-icon.png \
            --linux-shortcut \
            --dest installer
          mv installer/*.rpm installer/14bis-SSH-linux-${{ steps.ver.outputs.app }}.rpm

      - name: Package with jpackage (Linux portable tar.gz)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          jpackage \
            --input target \
            --name "ssh-14bis" \
            --main-jar 14bis-ssh-${{ steps.ver.outputs.jar }}.jar \
            --main-class br.com.quatorzebis.ssh.Main \
            --type app-image \
            --app-version ${{ steps.ver.outputs.app }} \
            --vendor "Molho Ltda." \
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." \
            --description "Lightweight SSH terminal client" \
            --icon target/app-icon.png \
            --dest installer-appimage
          tar -C installer-appimage -czf installer/14bis-SSH-linux-${{ steps.ver.outputs.app }}.tar.gz "ssh-14bis"

      - name: Convert icon to ICNS (macOS)
        if: matrix.runner == 'macos-latest'
        run: |
          mkdir -p target/icon.iconset
          for sz in 16 32 128 256 512; do
            sips -z $sz $sz target/app-icon.png --out target/icon.iconset/icon_${sz}x${sz}.png
            sips -z $((sz*2)) $((sz*2)) target/app-icon.png --out target/icon.iconset/icon_${sz}x${sz}@2x.png
          done
          iconutil -c icns target/icon.iconset -o target/app-icon.icns

      - name: Package with jpackage (macOS)
        if: matrix.runner == 'macos-latest'
        run: |
          jpackage \
            --input target \
            --name "14bis SSH" \
            --main-jar 14bis-ssh-${{ steps.ver.outputs.jar }}.jar \
            --main-class br.com.quatorzebis.ssh.Main \
            --type dmg \
            --app-version ${{ steps.ver.outputs.app }} \
            --vendor "Molho Ltda." \
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." \
            --description "Lightweight SSH terminal client" \
            --icon target/app-icon.icns \
            --dest installer
          mv installer/*.dmg installer/14bis-SSH-macos-${{ steps.ver.outputs.app }}.dmg

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset-name }}
          path: installer/*
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all installers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: installers
          merge-multiple: true

      - name: Build release notes
        id: notes
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          APP_VERSION: ${{ needs.build.outputs.app-version }}
        run: |
          VERSION="$APP_VERSION"

          {
            echo "## 14bis SSH $REF_NAME"
            echo
            echo "**Molho Ltda. — Copyright (C) 2026 Vicente Melo**"
            echo
            echo "### Downloads"
            echo
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Windows (installer) | \`14bis-SSH-windows-${VERSION}.exe\` |"
            echo "| Windows (portable, no install / no admin required — unzip and run \`14bis SSH.exe\`) | \`14bis-SSH-windows-portable-${VERSION}.zip\` |"
            echo "| Linux (Debian/Ubuntu) | \`14bis-SSH-linux-${VERSION}.deb\` |"
            echo "| Linux (RHEL/OEL/AlmaLinux/Rocky Linux/SUSE/etc.) | \`14bis-SSH-linux-${VERSION}.rpm\` |"
            echo "| Linux (portable, no install — unpack and run \`bin/ssh-14bis\`) | \`14bis-SSH-linux-${VERSION}.tar.gz\` |"
            echo "| macOS    | \`14bis-SSH-macos-${VERSION}.dmg\` |"
            echo
            echo "> Java is bundled — no separate installation required."
            echo

            # Extract this version's section from CHANGELOG.md (from "## [VERSION]" up
            # to, but not including, the next "## [" heading).
            SECTION=$(awk -v ver="[$VERSION]" '
              substr($0,1,4) == "## [" { if (found) exit; if (index($0, ver)) { found=1; next } }
              found && $0 == "---" { exit }
              found { print }
            ' CHANGELOG.md)

            if [ -n "$SECTION" ]; then
              echo "### What's new in this version"
              echo
              echo "$SECTION"
            fi
          } > release-notes.md

          cat release-notes.md

      - name: Create release and upload assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: "14bis SSH ${{ github.ref_name }}"
          body_path: release-notes.md
          files: installers/*
          draft: false
          prerelease: false
