name: Build & Release

on:
  push:
    tags:
      - 'v*'           # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build — ${{ matrix.os-label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner:     windows-latest
            os-label:   Windows
            mvn-profile: windows
            pkg-type:   exe
            asset-name: 14bis-SSH-windows.exe

          - runner:     ubuntu-latest
            os-label:   Linux
            mvn-profile: linux
            pkg-type:   deb
            asset-name: 14bis-SSH-linux.deb

          - runner:     macos-latest
            os-label:   macOS (Apple Silicon)
            mvn-profile: macos-arm
            pkg-type:   dmg
            asset-name: 14bis-SSH-macos.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build fat JAR
        run: mvn package -P ${{ matrix.mvn-profile }} -B -q

      - name: Convert icon to ICO (Windows)
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $src = [System.Drawing.Image]::FromFile("$PWD\target\app-icon.png")
          $sizes = @(16,32,48,256)
          $ms = New-Object System.IO.MemoryStream
          $bw = New-Object System.IO.BinaryWriter($ms)
          $bw.Write([uint16]0)       # reserved
          $bw.Write([uint16]1)       # type = ICO
          $bw.Write([uint16]$sizes.Count)
          $images = @()
          foreach ($sz in $sizes) {
            $bmp = New-Object System.Drawing.Bitmap($sz, $sz)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
            $g.DrawImage($src, 0, 0, $sz, $sz)
            $g.Dispose()
            $tmp = New-Object System.IO.MemoryStream
            $bmp.Save($tmp, [System.Drawing.Imaging.ImageFormat]::Png)
            $images += $tmp.ToArray()
            $bmp.Dispose()
          }
          $offset = 6 + $sizes.Count * 16
          for ($i = 0; $i -lt $sizes.Count; $i++) {
            $sz = $sizes[$i]; $data = $images[$i]
            $bw.Write([byte]$(if ($sz -eq 256) { 0 } else { $sz }))
            $bw.Write([byte]$(if ($sz -eq 256) { 0 } else { $sz }))
            $bw.Write([byte]0); $bw.Write([byte]0)
            $bw.Write([uint16]1); $bw.Write([uint16]32)
            $bw.Write([uint32]$data.Length)
            $bw.Write([uint32]$offset)
            $offset += $data.Length
          }
          foreach ($data in $images) { $bw.Write($data) }
          $bw.Flush()
          [System.IO.File]::WriteAllBytes("$PWD\target\app-icon.ico", $ms.ToArray())
          $src.Dispose()

      - name: Package with jpackage (Windows)
        if: matrix.runner == 'windows-latest'
        shell: cmd
        run: |
          jpackage ^
            --input target ^
            --name "14bis SSH" ^
            --main-jar 14bis-ssh-1.0.0.jar ^
            --main-class br.com.quatorzebis.ssh.Main ^
            --type exe ^
            --app-version 1.0.0 ^
            --vendor "Molho Ltda." ^
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." ^
            --description "Lightweight SSH terminal client" ^
            --icon target\app-icon.ico ^
            --win-dir-chooser ^
            --win-menu ^
            --win-shortcut ^
            --dest installer

      - name: Package with jpackage (Linux)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          jpackage \
            --input target \
            --name "ssh-14bis" \
            --main-jar 14bis-ssh-1.0.0.jar \
            --main-class br.com.quatorzebis.ssh.Main \
            --type deb \
            --app-version 1.0.0 \
            --vendor "Molho Ltda." \
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." \
            --description "Lightweight SSH terminal client" \
            --icon target/app-icon.png \
            --linux-shortcut \
            --dest installer
          mv installer/*.deb installer/14bis-SSH-linux.deb

      - name: Convert icon to ICNS (macOS)
        if: matrix.runner == 'macos-latest'
        run: |
          mkdir -p target/icon.iconset
          for sz in 16 32 128 256 512; do
            sips -z $sz $sz target/app-icon.png --out target/icon.iconset/icon_${sz}x${sz}.png
            sips -z $((sz*2)) $((sz*2)) target/app-icon.png --out target/icon.iconset/icon_${sz}x${sz}@2x.png
          done
          iconutil -c icns target/icon.iconset -o target/app-icon.icns

      - name: Package with jpackage (macOS)
        if: matrix.runner == 'macos-latest'
        run: |
          jpackage \
            --input target \
            --name "14bis SSH" \
            --main-jar 14bis-ssh-1.0.0.jar \
            --main-class br.com.quatorzebis.ssh.Main \
            --type dmg \
            --app-version 1.0.0 \
            --vendor "Molho Ltda." \
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." \
            --description "Lightweight SSH terminal client" \
            --icon target/app-icon.icns \
            --dest installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset-name }}
          path: installer/*
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "14bis SSH ${{ github.ref_name }}"
          body: |
            ## 14bis SSH ${{ github.ref_name }}

            **Molho Ltda. — Copyright (C) 2026 Vicente Melo**

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows  | `14bis-SSH-windows.exe` |
            | Linux    | `14bis-SSH-linux.deb` |
            | macOS    | `14bis-SSH-macos.dmg` |

            > Java is bundled — no separate installation required.

          files: installers/*
          draft: false
          prerelease: false
