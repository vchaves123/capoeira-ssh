name: Build & Release

on:
  push:
    tags:
      - 'v*'           # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build — ${{ matrix.os-label }}
    runs-on: ${{ matrix.runner }}
    outputs:
      app-version: ${{ steps.ver.outputs.app }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner:     windows-latest
            os-label:   Windows
            mvn-profile: windows
            pkg-type:   exe
            asset-name: capoeira-ssh-windows.exe

          - runner:     ubuntu-latest
            os-label:   Linux
            mvn-profile: linux
            pkg-type:   deb+rpm
            asset-name: capoeira-ssh-linux

          - runner:     macos-latest
            os-label:   macOS (Apple Silicon)
            mvn-profile: macos-arm
            pkg-type:   dmg
            asset-name: capoeira-ssh-macos.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build fat JAR
        run: mvn package -P ${{ matrix.mvn-profile }} -B -q

      - name: Get version info
        id: ver
        shell: bash
        run: |
          # GITHUB_REF_NAME is read as an env var (never inlined into the script), and
          # validated to a safe charset so the derived `app` output — which IS expanded
          # by the Actions expression templating into later run: blocks — cannot carry
          # shell metacharacters.
          TAG="${GITHUB_REF_NAME:-v0.0.0}"
          if [[ ! "$TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Refusing unsafe tag name: $TAG" >&2
            exit 1
          fi
          echo "app=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "jar=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -B)" >> "$GITHUB_OUTPUT"

      # target/app-icon.ico is produced by IconExporter during `mvn package` (with BMP/DIB
      # entries for the small sizes so the Windows shell renders the launcher icon).

      - name: Package with jpackage (Windows)
        if: matrix.runner == 'windows-latest'
        shell: cmd
        run: |
          jpackage ^
            --input target ^
            --name "Capoeira SSH" ^
            --main-jar capoeira-ssh-${{ steps.ver.outputs.jar }}.jar ^
            --main-class br.com.capoeirassh.ssh.Main ^
            --type exe ^
            --app-version ${{ steps.ver.outputs.app }} ^
            --vendor "Molho Ltda." ^
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." ^
            --description "Lightweight SSH terminal client" ^
            --icon target\app-icon.ico ^
            --win-upgrade-uuid "C7A3F2E1-84BD-4D9A-B06E-2F1C3A5D8E90" ^
            --win-dir-chooser ^
            --win-menu ^
            --win-shortcut ^
            --dest installer
          for %%f in (installer\*.exe) do ren "%%f" "capoeira-ssh-windows-${{ steps.ver.outputs.app }}.exe"

      - name: Sign Windows installer
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.CODE_SIGN_CERT_BASE64 }}
          CERT_PASS:   ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          if (-not $env:CERT_BASE64) {
            Write-Host "CODE_SIGN_CERT_BASE64 secret not set — skipping signing."
            exit 0
          }
          # Write PFX to a temp file
          $pfx = Join-Path $env:TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_BASE64))
          # Locate signtool from the Windows SDK
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like '*x64*' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }
          $installer = (Get-ChildItem installer\*.exe | Select-Object -First 1).FullName
          & $signtool sign `
            /fd  SHA256 `
            /td  SHA256 `
            /tr  http://timestamp.sectigo.com `
            /f   $pfx `
            /p   $env:CERT_PASS `
            $installer
          Remove-Item $pfx -Force
          Write-Host "Signed: $installer"

      - name: Package with jpackage (Windows portable)
        if: matrix.runner == 'windows-latest'
        shell: cmd
        run: |
          jpackage ^
            --input target ^
            --name "Capoeira SSH" ^
            --main-jar capoeira-ssh-${{ steps.ver.outputs.jar }}.jar ^
            --main-class br.com.capoeirassh.ssh.Main ^
            --type app-image ^
            --app-version ${{ steps.ver.outputs.app }} ^
            --vendor "Molho Ltda." ^
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." ^
            --description "Lightweight SSH terminal client" ^
            --icon target\app-icon.ico ^
            --dest installer-portable

      - name: Sign Windows portable exe
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.CODE_SIGN_CERT_BASE64 }}
          CERT_PASS:   ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          if (-not $env:CERT_BASE64) {
            Write-Host "CODE_SIGN_CERT_BASE64 secret not set — skipping signing."
            exit 0
          }
          $pfx = Join-Path $env:TEMP "codesign-portable.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like '*x64*' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }
          $exe = (Get-ChildItem "installer-portable\Capoeira SSH\Capoeira SSH.exe").FullName
          & $signtool sign `
            /fd  SHA256 `
            /td  SHA256 `
            /tr  http://timestamp.sectigo.com `
            /f   $pfx `
            /p   $env:CERT_PASS `
            $exe
          Remove-Item $pfx -Force
          Write-Host "Signed: $exe"

      - name: Zip Windows portable build
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "installer-portable\Capoeira SSH\*" `
            -DestinationPath "installer\capoeira-ssh-windows-portable-${{ steps.ver.outputs.app }}.zip"

      - name: Package MSIX for Microsoft Store (Windows)
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.app }}"
          $stage = "msix-stage"
          New-Item -ItemType Directory -Force -Path "$stage\Assets" | Out-Null

          Copy-Item "installer-portable\Capoeira SSH\*" -Destination $stage -Recurse -Force

          # MSIX requires exactly four numeric version segments, and the Microsoft Store
          # requires the fourth to be 0.
          (Get-Content packaging\msix\AppxManifest.xml.template) `
            -replace '__VERSION__', "$ver.0" |
            Set-Content "$stage\AppxManifest.xml" -Encoding utf8

          Copy-Item target\icon-44.png  "$stage\Assets\Square44x44Logo.png"    -Force
          Copy-Item target\icon-150.png "$stage\Assets\Square150x150Logo.png" -Force
          Copy-Item target\icon-50.png  "$stage\Assets\StoreLogo.png"         -Force

          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter makeappx.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like '*x64*' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $makeappx) { Write-Error "makeappx.exe not found"; exit 1 }

          & $makeappx pack /d $stage /p "installer\capoeira-ssh-windows-$ver.msix" /overwrite
          if ($LASTEXITCODE -ne 0) { Write-Error "makeappx failed with exit code $LASTEXITCODE"; exit 1 }
          Write-Host "Built: installer\capoeira-ssh-windows-$ver.msix"

      - name: Install rpmbuild (Linux)
        if: matrix.runner == 'ubuntu-latest'
        run: sudo apt-get update -qq && sudo apt-get install -y rpm

      - name: Package with jpackage (Linux DEB)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          jpackage \
            --input target \
            --name "capoeira-ssh" \
            --main-jar capoeira-ssh-${{ steps.ver.outputs.jar }}.jar \
            --main-class br.com.capoeirassh.ssh.Main \
            --type deb \
            --app-version ${{ steps.ver.outputs.app }} \
            --vendor "Molho Ltda." \
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." \
            --description "Lightweight SSH terminal client" \
            --icon target/app-icon.png \
            --linux-shortcut \
            --dest installer
          mv installer/*.deb installer/capoeira-ssh-linux-${{ steps.ver.outputs.app }}.deb

      - name: Package with jpackage (Linux RPM)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          jpackage \
            --input target \
            --name "capoeira-ssh" \
            --main-jar capoeira-ssh-${{ steps.ver.outputs.jar }}.jar \
            --main-class br.com.capoeirassh.ssh.Main \
            --type rpm \
            --app-version ${{ steps.ver.outputs.app }} \
            --vendor "Molho Ltda." \
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." \
            --description "Lightweight SSH terminal client" \
            --icon target/app-icon.png \
            --linux-shortcut \
            --dest installer
          mv installer/*.rpm installer/capoeira-ssh-linux-${{ steps.ver.outputs.app }}.rpm

      - name: Package with jpackage (Linux portable tar.gz)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          jpackage \
            --input target \
            --name "capoeira-ssh" \
            --main-jar capoeira-ssh-${{ steps.ver.outputs.jar }}.jar \
            --main-class br.com.capoeirassh.ssh.Main \
            --type app-image \
            --app-version ${{ steps.ver.outputs.app }} \
            --vendor "Molho Ltda." \
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." \
            --description "Lightweight SSH terminal client" \
            --icon target/app-icon.png \
            --dest installer-appimage
          tar -C installer-appimage -czf installer/capoeira-ssh-linux-${{ steps.ver.outputs.app }}.tar.gz "capoeira-ssh"

      - name: Package no-JRE bundle (all platforms, built once)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          set -e
          VER="${{ steps.ver.outputs.app }}"
          JARVER="${{ steps.ver.outputs.jar }}"
          SWT_VER="$(mvn help:evaluate -Dexpression=swt.version -q -DforceStdout -B)"
          STAGE="stage-nojre/capoeira-ssh"
          mkdir -p "$STAGE/lib/swt"

          # App code only (no bundled SWT/JSch) — the "original-" jar the shade plugin leaves
          # behind before shading in this platform's SWT.
          cp "target/original-capoeira-ssh-${JARVER}.jar" "$STAGE/lib/capoeira-ssh-${JARVER}.jar"

          mvn dependency:copy -q -B \
            -Dartifact=com.github.mwiede:jsch:0.2.21 \
            -DoutputDirectory="$STAGE/lib"

          for GA in \
            org.eclipse.platform:org.eclipse.swt.win32.win32.x86_64 \
            org.eclipse.platform:org.eclipse.swt.win32.win32.aarch64 \
            org.eclipse.platform:org.eclipse.swt.gtk.linux.x86_64 \
            org.eclipse.platform:org.eclipse.swt.gtk.linux.aarch64 \
            org.eclipse.platform:org.eclipse.swt.cocoa.macosx.x86_64 \
            org.eclipse.platform:org.eclipse.swt.cocoa.macosx.aarch64 \
          ; do
            mvn dependency:copy -q -B \
              -Dartifact="${GA}:${SWT_VER}" \
              -DoutputDirectory="$STAGE/lib/swt" \
              -Dmdep.stripVersion=true
          done

          cp packaging/nojre/run.sh packaging/nojre/run.bat packaging/nojre/README.txt "$STAGE/"
          chmod +x "$STAGE/run.sh"

          tar -C stage-nojre -czf "installer/capoeira-ssh-nojre-multiplatform-${VER}.tar.gz" "capoeira-ssh"

      - name: Convert icon to ICNS (macOS)
        if: matrix.runner == 'macos-latest'
        run: |
          mkdir -p target/icon.iconset
          for sz in 16 32 128 256 512; do
            sips -z $sz $sz target/app-icon.png --out target/icon.iconset/icon_${sz}x${sz}.png
            sips -z $((sz*2)) $((sz*2)) target/app-icon.png --out target/icon.iconset/icon_${sz}x${sz}@2x.png
          done
          iconutil -c icns target/icon.iconset -o target/app-icon.icns

      - name: Package with jpackage (macOS)
        if: matrix.runner == 'macos-latest'
        run: |
          jpackage \
            --input target \
            --name "Capoeira SSH" \
            --main-jar capoeira-ssh-${{ steps.ver.outputs.jar }}.jar \
            --main-class br.com.capoeirassh.ssh.Main \
            --type dmg \
            --app-version ${{ steps.ver.outputs.app }} \
            --vendor "Molho Ltda." \
            --copyright "Copyright (C) 2026 Vicente Melo - Molho Ltda." \
            --description "Lightweight SSH terminal client" \
            --icon target/app-icon.icns \
            --dest installer
          mv installer/*.dmg installer/capoeira-ssh-macos-${{ steps.ver.outputs.app }}.dmg

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset-name }}
          path: installer/*
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all installers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: installers
          merge-multiple: true

      - name: Build release notes
        id: notes
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          APP_VERSION: ${{ needs.build.outputs.app-version }}
        run: |
          VERSION="$APP_VERSION"

          {
            echo "## Capoeira SSH $REF_NAME"
            echo
            echo "**Molho Ltda. — Copyright (C) 2026 Vicente Melo**"
            echo
            echo "### Downloads"
            echo
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Windows (installer) | \`capoeira-ssh-windows-${VERSION}.exe\` |"
            echo "| Windows (portable, no install / no admin required — unzip and run \`Capoeira SSH.exe\`) | \`capoeira-ssh-windows-portable-${VERSION}.zip\` |"
            echo "| Windows (MSIX, for sideloading/testing — the Microsoft Store listing is the supported way to install this format) | \`capoeira-ssh-windows-${VERSION}.msix\` |"
            echo "| Linux (Debian/Ubuntu) | \`capoeira-ssh-linux-${VERSION}.deb\` |"
            echo "| Linux (RHEL/OEL/AlmaLinux/Rocky Linux/SUSE/etc.) | \`capoeira-ssh-linux-${VERSION}.rpm\` |"
            echo "| Linux (portable, no install — unpack and run \`bin/capoeira-ssh\`) | \`capoeira-ssh-linux-${VERSION}.tar.gz\` |"
            echo "| macOS    | \`capoeira-ssh-macos-${VERSION}.dmg\` |"
            echo "| Any OS (Windows/Linux/macOS, x86_64/aarch64) — requires Java 21+ already installed, run \`run.bat\`/\`run.sh\` | \`capoeira-ssh-nojre-multiplatform-${VERSION}.tar.gz\` |"
            echo
            echo "> Java is bundled in every installer/portable build above — no separate installation"
            echo "> required. The \`nojre\` bundle is the exception: it ships no runtime, for users who"
            echo "> want to run Capoeira SSH on a Java 21+ they already manage themselves."
            echo

            # Extract this version's section from CHANGELOG.md (from "## [VERSION]" up
            # to, but not including, the next "## [" heading).
            SECTION=$(awk -v ver="[$VERSION]" '
              substr($0,1,4) == "## [" { if (found) exit; if (index($0, ver)) { found=1; next } }
              found && $0 == "---" { exit }
              found { print }
            ' CHANGELOG.md)

            if [ -n "$SECTION" ]; then
              echo "### What's new in this version"
              echo
              echo "$SECTION"
            fi
          } > release-notes.md

          cat release-notes.md

      - name: Create release and upload assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: "Capoeira SSH ${{ github.ref_name }}"
          body_path: release-notes.md
          files: installers/*
          draft: false
          prerelease: false
